name: Domain health check and automatic fallback

on:
  schedule:
    - cron: "0 6 * * *"   # once daily, 06:00 UTC
  workflow_dispatch: {}    # allows a manual test run from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  check-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read deployment state
        id: state
        run: |
          ACTIVE=$(jq -r '.customDomainActive' src/_data/deployment.json)
          DOMAIN=$(jq -r '.customDomain' src/_data/deployment.json)
          FAILURES=$(jq -r '.consecutiveFailures // 0' src/_data/deployment.json)
          echo "active=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "failures=$FAILURES" >> "$GITHUB_OUTPUT"

      # Nothing to check if the custom domain isn't marked active yet
      # (e.g. sodalitas.cc hasn't been registered or configured).
      - name: Check domain health
        if: steps.state.outputs.active == 'true'
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://${{ steps.state.outputs.domain }}" || echo "000")
          echo "Checked https://${{ steps.state.outputs.domain }} — status $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Update failure count
        if: steps.state.outputs.active == 'true'
        id: update
        run: |
          STATUS="${{ steps.check.outputs.status }}"
          PREV="${{ steps.state.outputs.failures }}"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            NEW=0
          else
            NEW=$((PREV + 1))
          fi
          jq --argjson n "$NEW" --arg s "$STATUS" --arg t "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '.consecutiveFailures = $n | .lastStatus = $s | .lastChecked = $t' \
            src/_data/deployment.json > tmp.json && mv tmp.json src/_data/deployment.json
          echo "failures=$NEW" >> "$GITHUB_OUTPUT"

      # Five consecutive failed daily checks — roughly five days of the
      # domain being unreachable — before anything changes. A genuine
      # lapse doesn't resolve itself overnight; a DNS blip usually does.
      - name: Clear custom domain via GitHub API
        if: steps.state.outputs.active == 'true' && fromJSON(steps.update.outputs.failures) >= 5
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
        run: |
          curl -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"cname": null}'
          jq '.customDomainActive = false' src/_data/deployment.json > tmp.json && mv tmp.json src/_data/deployment.json

      - name: Open a notification issue
        if: steps.state.outputs.active == 'true' && fromJSON(steps.update.outputs.failures) >= 5
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Custom domain fallback triggered automatically",
              body: "sodalitas.cc could not be reached for five consecutive daily checks, so the site has automatically reverted to its default GitHub Pages URL.\n\nThis does not undo itself. Once the domain is working again: re-enter it under Settings → Pages → Custom domain, set `customDomainActive` back to `true` in `src/_data/deployment.json`, and push."
            })

      - name: Commit and push state changes
        if: steps.state.outputs.active == 'true'
        run: |
          git config user.name "sodalitas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/_data/deployment.json
          git diff --staged --quiet || git commit -m "Domain health check: ${{ steps.update.outputs.failures }} consecutive failure(s)"
          git push
